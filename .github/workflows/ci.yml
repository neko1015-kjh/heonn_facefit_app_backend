name: CI (자동 테스트)
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: system libs
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 libegl1 libgles2
      - name: model cache
        uses: actions/cache@v4
        with:
          path: |
            face_landmarker.task
            face_recognition_sface_2021dec.onnx
            gender_net.caffemodel
            age_net.caffemodel
            gender_deploy.prototxt
            age_deploy.prototxt
          key: models-v1
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: test
        run: pytest -q
