name: 주간 DB 백업
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: install pg client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then echo "DATABASE_URL not set - skip"; exit 0; fi
          ts=$(date +%Y%m%d)
          pg_dump "$DATABASE_URL" --no-owner --no-privileges | gzip > "backup-$ts.sql.gz"
          ls -lh "backup-$ts.sql.gz"
      - name: upload
        if: ${{ hashFiles('backup-*.sql.gz') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backup-*.sql.gz
          retention-days: 30
