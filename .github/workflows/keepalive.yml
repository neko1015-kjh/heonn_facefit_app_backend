name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: 백엔드 깨우기(ping /health)
        run: |
          curl -s -m 60 -o /dev/null -w "health %{http_code} (%{time_total}s)\n" \
            https://neko1015-facefit-backend.hf.space/health || true
